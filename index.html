<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSE Live Stock Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1e293b; margin-top: 0; }
        .input-group {
            margin: 20px 0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            text-transform: uppercase;
        }
        button {
            padding: 12px 20px;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #047857; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .success { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .error { background-color: #fef2f2; border: 1px solid #fca5a5; color: #991b1b; }
        .price { font-size: 28px; font-weight: bold; margin: 10px 0; }
        .loader { font-size: 14px; color: #64748b; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>BSE Stock Tracker</h2>
    <p style="color: #64748b; font-size: 14px;">Enter a BSE Scrip Name (e.g., RELIANCE, TCS) or 6-digit Code (e.g., 500325)</p>
    
    <div class="input-group">
        <input type="text" id="scripInput" placeholder="e.g., RELIANCE" onkeypress="handleKeyPress(event)">
        <button onclick="fetchStockPrice()">Get Price</button>
    </div>

    <div id="loadingStatus" class="loader">Fetching live price...</div>

    <div id="result" class="result-box">
        <div id="stockTitle" style="font-weight: 600;"></div>
        <div id="stockPrice" class="price"></div>
        <div id="stockDetails" style="font-size: 12px; color: #64748b; margin-top: 5px;"></div>
    </div>
</div>

<script>
    async function fetchStockPrice() {
        let input = document.getElementById('scripInput').value.trim().toUpperCase();
        const resultDiv = document.getElementById('result');
        const loadingStatus = document.getElementById('loadingStatus');
        const stockTitle = document.getElementById('stockTitle');
        const stockPrice = document.getElementById('stockPrice');
        const stockDetails = document.getElementById('stockDetails');

        if (!input) return;

        // Ensure the ticker has the correct BSE suffix required by Yahoo Finance
        if (!input.endsWith('.BO')) {
            input = `${input}.BO`;
        }

        resultDiv.style.display = 'none';
        loadingStatus.style.display = 'block';

        const targetUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${input}?interval=1m&range=1d`;
        
        // Wrapping the request with a free public CORS proxy
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(proxyUrl);
            if (!response.ok) throw new Error('Network error via proxy');
            
            const proxyData = await response.json();
            
            // Allorigins bundles the response into a JSON object string under the .contents key
            const data = JSON.parse(proxyData.contents);
            
            if (!data.chart || !data.chart.result) {
                throw new Error('Invalid ticker');
            }

            const meta = data.chart.result[0].meta;
            const price = meta.regularMarketPrice;
            const prevClose = meta.previousClose;
            const netChange = price - prevClose;
            const pctChange = (netChange / prevClose) * 100;

            loadingStatus.style.display = 'none';
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-box success';
            stockTitle.innerText = input.replace('.BO', '');
            
            // Format using the Indian Numbering System
            stockPrice.innerText = `₹ ${price.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
            
            // Show daily movement details
            const direction = netChange >= 0 ? '▲' : '▼';
            stockDetails.innerText = `${direction} ${Math.abs(netChange).toFixed(2)} (${pctChange.toFixed(2)}%) Today`;
            stockDetails.style.color = netChange >= 0 ? '#166534' : '#991b1b';

        } catch (err) {
            loadingStatus.style.display = 'none';
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-box error';
            stockTitle.innerText = 'Error';
            stockPrice.innerText = '';
            stockDetails.innerText = 'Could not retrieve data. Double-check your scrip name or numeric BSE ID.';
            stockDetails.style.color = '#991b1b';
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            fetchStockPrice();
        }
    }
</script>

</body>
</html>
