<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSE Live Stock Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h2 { color: #1e293b; margin-top: 0; }
        .input-group {
            margin: 20px 0 10px 0;
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 16px;
            text-transform: uppercase;
        }
        button {
            padding: 12px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        .hint-text {
            color: #64748b; 
            font-size: 13px;
            text-align: left;
            margin: 0;
            line-height: 1.4;
        }
        #widget-container {
            width: 100%;
            min-height: 220px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>BSE Live Stock Tracker</h2>
        
        <div class="input-group">
            <input type="text" id="scripInput" placeholder="e.g., 500325 or RELIANCE" onkeypress="handleKeyPress(event)">
            <button onclick="loadStockWidget()">Track Price</button>
        </div>
        
        <p class="hint-text">
            💡 **Tips:** <br>
            • For BSE numerical tracking, type the code directly (e.g., `500325` for Reliance). <br>
            • For standard text lookups, type the name directly (e.g., `TCS`, `INFY`, `RELIANCE`).
        </p>
    </div>

    <!-- The interactive live widget mounts dynamically here -->
    <div id="widget-container"></div>
</div>

<script>
    function loadStockWidget() {
        let input = document.getElementById('scripInput').value.trim().toUpperCase();
        const container = document.getElementById('widget-container');
        
        if (!input) return;

        // Clear any old instances sitting in the wrapper
        container.innerHTML = '';
        container.style.display = 'block';

        // Determine symbol layout route
        // If the user inputs a 6-digit number, target BSE natively. Otherwise, check general lookup.
        let tradingViewSymbol = "";
        const isNumericBse = /^\d{6}$/.test(input);

        if (isNumericBse) {
            tradingViewSymbol = `BSE:${input}`;
        } else {
            // Text values evaluate robustly across standard indexes
            tradingViewSymbol = `BSE:${input}`;
        }

        // Dynamically instantiate the tracking element
        const script = document.createElement('script');
        script.type = 'text/javascript';
        script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js';
        script.async = true;
        
        // Configuration payload parameters
        script.text = JSON.stringify({
            "symbol": tradingViewSymbol,
            "width": "100%",
            "height": "100%",
            "locale": "in",
            "dateRange": "1D",
            "colorTheme": "light",
            "isTransparent": false,
            "autosize": true,
            "largeChartUrl": ""
        });

        container.appendChild(script);
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            loadStockWidget();
        }
    }
</script>

</body>
</html>
